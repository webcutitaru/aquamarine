# Snippet nginx (cPanel → MultiPHP Manager sau Include Editor)
# Blochează accesul la foldere sensibile când .htaccess nu e aplicat.

location ^~ /database/ { deny all; return 403; }
location ^~ /includes/ { deny all; return 403; }
location ^~ /vendor/ { deny all; return 403; }
location = /database/check_setup.php { deny all; return 403; }

# Redirect www → apex
if ($host = www.aquamarine.md) {
    return 301 https://aquamarine.md$request_uri;
}

